                            list="matriz-cui-options-list"
                            placeholder="Buscar CUI..."
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-text shadow-sm transition-all placeholder:text-[#94A3B8]"
                            value={colFilters.cui} 
                            onChange={(e) => handleColFilterChange('cui', e.target.value)}
                          />
                          <datalist id="matriz-cui-options-list">
                            {optsMatCui.map(opt => <option key={opt} value={opt} />)}
                          </datalist>
                        </th>
                        <th className="px-6 py-6 align-top w-1/6">
                          <SortableHeader label="Componente" sortKey="componente" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.componente} onChange={(e) => handleColFilterChange('componente', e.target.value)}
                          >
                            <option value="">TODOS</option>
                            {optsMatComp.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                        <th className="px-6 py-6 align-top w-1/4">
                          <SortableHeader label="Hito de Ejecución" sortKey="hito" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer max-w-[220px] shadow-sm transition-all"
                            value={colFilters.hito} onChange={(e) => handleColFilterChange('hito', e.target.value)}
                          >
                            <option value="">TODOS LOS HITOS</option>
                            {optsMatHito.map(opt => <option key={opt} value={opt} title={opt}>{opt.length > 50 ? opt.substring(0, 50) + '...' : opt}</option>)}
                          </select>
                        </th>
                        <th className="px-6 py-6 align-top w-1/6">
                          <SortableHeader label="Fechas Prog." sortKey="fFin" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.fFin} onChange={(e) => handleColFilterChange('fFin', e.target.value)}
                          >
                            <option value="">TODAS</option>
                            {optsMatFin.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                        <th className="px-6 py-6 align-top w-1/12">
                          <SortableHeader label="Estatus" sortKey="estatusOriginal" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.estatusOriginal} onChange={(e) => handleColFilterChange('estatusOriginal', e.target.value)}
                          >
                            <option value="">TODOS</option>
                            {optsMatEstatus.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                        <th className="px-6 py-6 align-top w-1/6">
                          <SortableHeader label="Estado" sortKey="estado" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.estado} onChange={(e) => handleColFilterChange('estado', e.target.value)}
                          >
                            <option value="">TODOS</option>
                            {optsMatEst.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedData.length > 0 ? sortedData.map((row, index) => (
                        <tr key={index} className="bg-white border-b border-[#F1F5F9] hover:bg-[#F8FAFC] transition-colors group">
                          <td className="px-6 py-7">
                            <span className="font-bold text-[#1E293B] block mb-2 text-[13px]">{row.localizacion}</span>
                            <span className="text-[10px] font-black tracking-widest text-[#94A3B8] uppercase block">{row.programa}</span>
                          </td>
                          <td className="px-6 py-7">
                            <span className="font-black text-[11px] tracking-widest text-[#4C1D95] bg-[#F5F3FF] border border-[#EDE9FE] px-3 py-1.5 rounded-lg whitespace-nowrap">
                              {row.cui || 'S/N'}
                            </span>
                          </td>
                          <td className="px-6 py-7">
                            <div className="flex flex-col gap-3">
                              <span className="text-[10px] font-bold text-[#6D28D9] bg-[#F5F3FF] px-3 py-1.5 rounded-lg border border-[#EDE9FE] w-fit tracking-wider">
                                {row.componente}
                              </span>
                              <span className="text-[12px] font-medium text-[#64748B] line-clamp-2 leading-relaxed" title={row.subComponente}>
                                {row.subComponente}
                              </span>
                            </div>
                          </td>
                          <td className="px-6 py-7">
                            <p className="text-[13px] font-bold text-[#334155] leading-relaxed" title={row.hito}>{row.hito}</p>
                            {row.comentario && (
                              <div className="mt-3 flex items-start gap-2 bg-white p-3 rounded-xl border border-[#E2E8F0] shadow-sm">
                                <AlertCircle size={14} className="shrink-0 text-[#A78BFA] mt-0.5" />
                                <p className="text-[11px] text-[#64748B] italic line-clamp-2 leading-relaxed" title={row.comentario}>{row.comentario}</p>
                              </div>
                            )}
                          </td>
                          <td className="px-6 py-7">
                            <div className="flex items-start gap-4">
                              <Calendar size={36} className="text-[#A78BFA] shrink-0" />
                              <div className="flex flex-col gap-1">
                                <span className="text-[12px] text-[#64748B] font-medium">Fecha Programada: {row.fFin}</span>
                                <span className="text-[13px] font-black text-[#334155]">Fecha de Entrega: {row.fInicio && row.fInicio !== '-' ? row.fInicio : '-'}</span>
                                {row.estadoDetalle && row.estadoDetalle !== 'NO DEFINIDO' && row.estadoDetalle !== '-' && (
                                  <span className={"text-[12px] font-black mt-1 " + (row.isVencido ? "text-[#E11D48]" : "text-[#065F46]")}>
                                    {row.estadoDetalle}
                                  </span>
                                )}
                              </div>
                            </div>
                          </td>
                          <td className="px-6 py-7">
                            <div className="flex items-center gap-3">
                              <span className={"px-3 py-1.5 rounded-lg text-[10px] font-bold border whitespace-nowrap shadow-sm tracking-wider uppercase bg-[#F8FAFC] text-[#475569] border-[#E2E8F0]"}>
                                {row.estatusOriginal}
                              </span>
                            </div>
                          </td>
                          <td className="px-6 py-7">
                            <div className="flex items-center gap-3">
                              <span className={"px-4 py-2 rounded-xl text-[11px] font-black border whitespace-nowrap shadow-sm uppercase tracking-wider " + row.colorClass}>
                                {row.estado}
                              </span>
                            </div>
                          </td>
                        </tr>
                      )) : (
                        <tr>
                          <td colSpan="7" className="px-8 py-32 text-center">
                            <div className="flex flex-col items-center justify-center text-[#94A3B8]">
                              <Filter size={48} className="mb-6 opacity-20" />
                              <p className="font-black text-[#475569] text-lg uppercase tracking-widest">Sin resultados</p>
                              <p className="text-sm mt-2 font-medium">Limpia los filtros en los encabezados para ver la data.</p>
                            </div>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (error) {
      const errorBox = document.getElementById('fallback-error');
      errorBox.style.display = 'block';
      errorBox.textContent = "Error al renderizar el dashboard:\\n" + error.message + "\\n\\n" + error.stack;
      document.getElementById('root').style.display = 'none';
      console.error(error);
    }
  </script>
</body>
</html>
