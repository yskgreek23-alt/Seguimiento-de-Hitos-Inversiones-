                          </td>
                          <td className="px-6 py-7">
                            <div className="flex items-center gap-3">
                              <span className={"px-4 py-2 rounded-xl text-[11px] font-black border whitespace-nowrap shadow-sm uppercase tracking-wider " + row.colorClass}>{row.estado}</span>
                            </div>
                          </td>
                        </tr>
                      )) : (
                        <tr>
                          <td colSpan="7" className="px-8 py-32 text-center">
                            <div className="flex flex-col items-center justify-center text-[#94A3B8]">
                              <Filter size={48} className="mb-6 opacity-20" />
                              <p className="font-black text-[#475569] text-lg uppercase tracking-widest">Sin resultados</p>
                              <p className="text-sm mt-2 font-medium">Limpia los filtros en los encabezados para ver la data.</p>
                            </div>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        );
      };
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (error) {
      const errorBox = document.getElementById('fallback-error');
      errorBox.style.display = 'block';
      errorBox.textContent = 'Error al renderizar el dashboard: ' + error.message + ' ' + error.stack;
      document.getElementById('root').style.display = 'none';
      console.error(error);
    }
  </script>
</body>
</html>
