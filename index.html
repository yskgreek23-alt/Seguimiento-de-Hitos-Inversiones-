                <div className="bg-white p-8 md:p-10 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.03)] border border-[#F8FAFC] animate-fade-up delay-300">
                  <h3 className="text-[13px] font-black text-[#475569] mb-10 flex items-center gap-3 uppercase tracking-widest">
                    <div className="w-2.5 h-8 bg-[#8B5CF6] rounded-full shadow-[0_0_10px_rgba(139,92,246,0.5)]"></div>
                    Monto Programado F-19
                  </h3>
                  <div className="h-96">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={chartDataMonto} margin={{ top: 30, right: 10, left: -20, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#F1F5F9" />
                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748B', fontSize: 12, fontWeight: 600, fontFamily: 'Poppins'}} dy={10} />
                        <YAxis axisLine={false} tickLine={false} tick={{fill: '#94A3B8', fontSize: 11, fontFamily: 'Poppins'}} tickFormatter={(val) => `S/${(val/1000).toFixed(0)}k`} />
                        <RechartsTooltip formatter={(value) => formatCurrency(value)} cursor={{fill: '#F8FAFC'}} contentStyle={{borderRadius: '20px', border: 'none', boxShadow: '0 20px 40px -5px rgba(0,0,0,0.1)', fontWeight: 'bold'}} />
                        <Bar dataKey="Monto" fill="url(#colorMonto)" radius={[12, 12, 0, 0]} maxBarSize={60} animationDuration={1500}>
                          <LabelList dataKey="Monto" position="top" formatter={(val) => formatCurrencyShort(val)} style={{ fill: '#4C1D95', fontSize: 12, fontWeight: 800, fontFamily: 'Poppins' }} dy={-10} />
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white p-8 md:p-10 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.03)] border border-[#F8FAFC] animate-fade-up delay-400">
                  <h3 className="text-[13px] font-black text-[#475569] mb-10 flex items-center gap-3 uppercase tracking-widest">
                    <div className="w-2.5 h-8 bg-[#EAB308] rounded-full shadow-[0_0_10px_rgba(234,179,8,0.5)]"></div>
                    Hitos por Estado
                  </h3>
                  <div className="h-96 flex justify-center">
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie
                          data={chartDataStatus}
                          cx="50%"
                          cy="50%"
                          innerRadius={0} 
                          outerRadius={110}
                          dataKey="value"
                          stroke="#FFFFFF" 
                          strokeWidth={3}
                          labelLine={{ stroke: '#475569', strokeWidth: 1.5 }}
                          label={(props) => {
                            const { x, y, cx, name, value, percent } = props;
                            if (value === 0) return null;
                            return (
                              <text x={x} y={y} fill="#1E293B" textAnchor={x > cx ? 'start' : 'end'} dominantBaseline="central" style={{ fontWeight: 900, fontSize: '12px', fontFamily: 'Poppins' }}>
                                {`${name}: ${value} (${(percent * 100).toFixed(1)}%)`}
                              </text>
                            );
                          }}
                          animationDuration={1500}
                        >
                          {chartDataStatus.map((entry, index) => (
                            <Cell key={`cell-${index}`} fill={entry.color} />
                          ))}
                        </Pie>
                        <RechartsTooltip contentStyle={{borderRadius: '20px', border: 'none', boxShadow: '0 20px 40px -5px rgba(0,0,0,0.1)', fontWeight: 'bold'}} />
                        <Legend verticalAlign="bottom" height={40} iconType="circle" wrapperStyle={{fontWeight: '800', fontSize: 14, paddingTop: '30px', color: '#1E293B'}} />
                      </PieChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white p-8 md:p-10 rounded-[40px] shadow-[0_20px_50px_rgba(0,0,0,0.03)] border border-[#F8FAFC] animate-fade-up delay-400">
                  <h3 className="text-[13px] font-black text-[#475569] mb-10 flex items-center gap-3 uppercase tracking-widest">
                    <div className="w-2.5 h-8 bg-[#3B82F6] rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></div>
                    Top 5 Localizaciones
                  </h3>
                  <div className="h-96">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart layout="vertical" data={chartDataLocs} margin={{ top: 10, right: 50, left: 10, bottom: 0 }}>
                        <CartesianGrid strokeDasharray="3 3" horizontal={false} stroke="#F1F5F9" />
                        <XAxis type="number" hide />
                        <YAxis dataKey="name" type="category" axisLine={false} tickLine={false} tick={{fill: '#64748B', fontSize: 11, fontWeight: 700, fontFamily: 'Poppins'}} width={110} />
                        <RechartsTooltip formatter={(value) => formatCurrency(value)} cursor={{fill: '#F8FAFC'}} contentStyle={{borderRadius: '20px', border: 'none', boxShadow: '0 20px 40px -5px rgba(0,0,0,0.1)', fontWeight: 'bold'}} />
                        <Bar dataKey="Monto" fill="url(#colorLocs)" radius={[0, 12, 12, 0]} maxBarSize={36} animationDuration={1500}>
                          <LabelList dataKey="Monto" position="right" formatter={(val) => formatCurrencyShort(val)} style={{ fill: '#1E3A8A', fontSize: 12, fontWeight: 800, fontFamily: 'Poppins' }} dx={5} />
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

              </div>

              <div className="bg-white rounded-[40px] shadow-[0_20px_60px_rgba(0,0,0,0.03)] border border-[#F1F5F9] overflow-hidden mb-12 animate-fade-up delay-300">
                <div className="px-10 py-8 border-b-2 border-[#F8FAFC] flex flex-col md:flex-row md:justify-between md:items-center bg-white gap-4">
                  <h3 className="text-xl font-black text-[#1E293B] uppercase tracking-widest flex items-center gap-3">
                    <div className="p-2 bg-[#F1F5F9] rounded-xl"><Filter size={20} className="text-[#64748B]" /></div>
                    Matriz de Monitoreo de Ejecución
                  </h3>
                  <span className="bg-[#F8FAFC] border border-[#E2E8F0] text-[#475569] text-xs px-5 py-2.5 rounded-xl font-black tracking-widest shadow-sm">
                    {sortedData.length} REGISTROS LISTADOS
                  </span>
                </div>
                <div className="overflow-x-auto">
                  <table className="w-full text-sm text-left text-[#475569]">
                    <thead className="text-[11px] text-[#64748B] uppercase bg-[#F8FAFC] border-b-2 border-[#E2E8F0]">
                      <tr>
                        <th className="px-8 py-6 align-top w-1/5">
                          <SortableHeader label="Prog. / Localización" sortKey="localizacion" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.localizacion} onChange={(e) => handleColFilterChange('localizacion', e.target.value)}
                          >
                            <option value="">TODAS LAS LOC.</option>
                            {optsMatLoc.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                        <th className="px-8 py-6 align-top w-1/5">
                          <SortableHeader label="Componente" sortKey="componente" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.componente} onChange={(e) => handleColFilterChange('componente', e.target.value)}
                          >
                            <option value="">TODOS</option>
                            {optsMatComp.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                        <th className="px-8 py-6 align-top w-1/4">
                          <SortableHeader label="Hito de Ejecución" sortKey="hito" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer max-w-[220px] shadow-sm transition-all"
                            value={colFilters.hito} onChange={(e) => handleColFilterChange('hito', e.target.value)}
                          >
                            <option value="">TODOS LOS HITOS</option>
                            {optsMatHito.map(opt => <option key={opt} value={opt} title={opt}>{opt.length > 30 ? opt.substring(0, 30) + '...' : opt}</option>)}
                          </select>
                        </th>
                        <th className="px-8 py-6 align-top w-1/6">
                          <SortableHeader label="Fechas Prog." sortKey="fFin" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.fFin} onChange={(e) => handleColFilterChange('fFin', e.target.value)}
                          >
                            <option value="">TODAS</option>
                            {optsMatFin.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                        <th className="px-8 py-6 align-top w-1/6">
                          <SortableHeader label="Estado" sortKey="estado" />
                          <select 
                            className="w-full mt-3 bg-white border-2 border-[#E2E8F0] rounded-xl p-3 text-[11px] font-bold outline-none focus:border-[#A78BFA] focus:ring-4 focus:ring-[#C4B5FD]/30 text-[#4C1D95] cursor-pointer shadow-sm transition-all"
                            value={colFilters.estado} onChange={(e) => handleColFilterChange('estado', e.target.value)}
                          >
                            <option value="">TODOS</option>
                            {optsMatEst.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedData.length > 0 ? sortedData.map((row, index) => (
                        <tr key={index} className="bg-white border-b border-[#F1F5F9] hover:bg-[#F8FAFC] transition-colors group">
                          <td className="px-8 py-7">
                            <span className="font-bold text-[#1E293B] block mb-2 text-[13px]">{row.localizacion}</span>
                            <span className="text-[10px] font-black tracking-widest text-[#94A3B8] uppercase">{row.programa}</span>
                          </td>
                          <td className="px-8 py-7">
                            <div className="flex flex-col gap-3">
                              <span className="text-[10px] font-bold text-[#6D28D9] bg-[#F5F3FF] px-3 py-1.5 rounded-lg border border-[#EDE9FE] w-fit tracking-wider">
                                {row.componente}
                              </span>
                              <span className="text-[12px] font-medium text-[#64748B] line-clamp-2 leading-relaxed" title={row.subComponente}>
                                {row.subComponente}
                              </span>
                            </div>
                          </td>
                          <td className="px-8 py-7">
                            <p className="text-[13px] font-bold text-[#334155] line-clamp-2 leading-relaxed" title={row.hito}>{row.hito}</p>
                            {row.comentario && (
                              <div className="mt-3 flex items-start gap-2 bg-white p-3 rounded-xl border border-[#E2E8F0] shadow-sm">
                                <AlertCircle size={14} className="shrink-0 text-[#A78BFA] mt-0.5" />
                                <p className="text-[11px] text-[#64748B] italic line-clamp-2 leading-relaxed" title={row.comentario}>{row.comentario}</p>
                              </div>
                            )}
                          </td>
                          <td className="px-8 py-7">
                            <div className="flex items-start gap-3">
                              <Calendar size={32} className="text-[#A78BFA] mt-0.5 shrink-0" />
                              <div className="flex flex-col gap-1">
                                <span className="text-[12px] text-[#64748B] font-medium">Inicio: {row.fInicio && row.fInicio !== '-' ? row.fInicio : '-'}</span>
                                <span className="text-[13px] font-black text-[#334155]">Fin: {row.fFin}</span>
                                {row.estadoDetalle && row.estadoDetalle !== 'No definido' && row.estadoDetalle !== '-' && (
                                  <span className={"text-[12px] font-black mt-1 " + (row.isVencido ? "text-[#E11D48]" : "text-[#065F46]")}>
                                    {row.estadoDetalle}
                                  </span>
                                )}
                              </div>
                            </div>
                          </td>
                          <td className="px-8 py-7">
                            <div className="flex items-center gap-3">
                              <span className={"px-4 py-2 rounded-xl text-[11px] font-black border whitespace-nowrap shadow-sm uppercase tracking-wider " + row.colorClass}>
                                {row.estado}
                              </span>
                            </div>
                          </td>
                        </tr>
                      )) : (
                        <tr>
                          <td colSpan="5" className="px-8 py-32 text-center">
                            <div className="flex flex-col items-center justify-center text-[#94A3B8]">
                              <Filter size={48} className="mb-6 opacity-20" />
                              <p className="font-black text-[#475569] text-lg uppercase tracking-widest">Sin resultados</p>
                              <p className="text-sm mt-2 font-medium">Limpia los filtros en los encabezados para ver la data.</p>
                            </div>
                          </td>
                        </tr>
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (error) {
      const errorBox = document.getElementById('fallback-error');
      errorBox.style.display = 'block';
      errorBox.textContent = "Error al renderizar el dashboard:\n" + error.message + "\n\n" + error.stack;
      document.getElementById('root').style.display = 'none';
      console.error(error);
    }
  </script>
</body>
</html>
